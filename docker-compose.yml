version: '3.9' 
 
services: 
  mongo: 
    image: mongo:7 
    container_name: smart-leads-mongo 
    restart: unless-stopped 
    ports: 
      - '27017:27017' 
    volumes: 
      - mongo-data:/data/db 
    environment: 
      MONGO_INITDB_DATABASE: smart-leads 
 
  api: 
    build: ./backend 
    container_name: smart-leads-api 
    restart: unless-stopped 
    ports: 
      - '5000:5000' 
    depends_on: 
      - mongo 
    environment: 
      PORT: 5000 
      MONGODB_URI: mongodb://mongo:27017/smart-leads 
      JWT_SECRET: ${JWT_SECRET} 
      JWT_EXPIRES_IN: 7d 
      NODE_ENV: production 
      CLIENT_URL: ${CLIENT_URL:-*} 
 
  frontend: 
    build: ./frontend 
    container_name: smart-leads-frontend 
    restart: unless-stopped 
    ports: 
      - '4173:4173' 
    depends_on: 
      - api 
    environment: 
      VITE_API_URL: http://localhost:5000 
 
volumes: 
  mongo-data:
